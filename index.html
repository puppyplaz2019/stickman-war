<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stickman War: God Mode</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; font-family: 'Arial', sans-serif; overflow: hidden; touch-action: none; user-select: none; }
        #ui { position: absolute; width: 100%; top: 20px; display: flex; justify-content: space-around; pointer-events: none; z-index: 10; display: none; }
        .hp-container { width: 35%; max-width: 300px; height: 20px; background: #333; border: 2px solid #000; border-radius: 5px; overflow: hidden; }
        .hp-bar { height: 100%; width: 100%; transition: width 0.1s; }
        #p1-hp { background: var(--p1-color, #3498db); }
        #p2-hp { background: #ff0000; box-shadow: 0 0 10px #ff0000; }
        
        #victory-screen, #start-menu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border: 5px solid #333;
            text-align: center; z-index: 1000; width: 80%; max-width: 380px; border-radius: 15px;
        }
        #victory-screen { display: none; }
        .btn { display: block; width: 100%; padding: 12px; margin: 8px 0; font-weight: bold; cursor: pointer; border: none; font-size: 14px; background: #333; color: white; border-radius: 8px; }
        .controls-layer { position: absolute; bottom: 0; width: 100%; height: 200px; display: flex; z-index: 50; pointer-events: none; display: none; }
        .player-touch-zone { flex: 1; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; padding: 10px; pointer-events: auto; }
        .t-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="start-menu">
    <h1 style="color: #ff0000;">ULTIMATE WAR</h1>
    <button class="btn" onclick="startGame(true, 'EASY')" style="background: #2ecc71;">EASY MODE</button>
    <button class="btn" onclick="startGame(true, 'GOD')" style="background: #000; border: 2px solid red; color: red;">GOD MODE (AI)</button>
    <button class="btn" onclick="startGame(false)" style="background: #e74c3c;">2 PLAYERS</button>
</div>

<div id="ui">
    <div class="hp-container"><div id="p1-hp" class="hp-bar"></div></div>
    <div class="hp-container"><div id="p2-hp" class="hp-bar"></div></div>
</div>

<div id="controls" class="controls-layer">
    <div class="player-touch-zone">
        <div class="t-btn" id="t1-left">←</div><div class="t-btn" id="t1-up">↑</div><div class="t-btn" id="t1-right">→</div>
        <div class="t-btn" style="grid-column: span 3; height: 60px;" id="t1-punch">PUNCH</div>
    </div>
</div>

<div id="victory-screen">
    <h1 id="winner-text">KO!</h1>
    <button class="btn" onclick="location.reload()">RETRY</button>
    <a href="index.html" class="btn" style="background:#00ffff; color:#000; text-decoration: none;">HUB</a>
</div>

<script>
let isCPU = false, difficulty = 'EASY', gameStarted = false;
const activeSkin = localStorage.getItem('active_skin_hex') || '#3498db';
const isRainbow = (activeSkin === 'rainbow');
document.documentElement.style.setProperty('--p1-color', isRainbow ? 'red' : activeSkin);

const { Engine, Render, Runner, Bodies, Composite, Body, Events, Vector } = Matter;
const engine = Engine.create();
const render = Render.create({
    element: document.body, engine: engine,
    options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: '#111' }
});

const floor = Bodies.rectangle(window.innerWidth/2, window.innerHeight-25, window.innerWidth, 50, { isStatic: true, render: { fillStyle: '#222' } });
const ceiling = Bodies.rectangle(window.innerWidth/2, 25, window.innerWidth, 50, { isStatic: true });
const wallL = Bodies.rectangle(-10, window.innerHeight/2, 20, window.innerHeight, { isStatic: true });
const wallR = Bodies.rectangle(window.innerWidth+10, window.innerHeight/2, 20, window.innerHeight, { isStatic: true });

function createStickman(x, y, color, id) {
    const head = Bodies.circle(x, y-50, 18, { friction: 0.1, label: id });
    const body = Bodies.rectangle(x, y, 12, 60, { friction: 0.1, label: id });
    const compound = Body.create({ parts: [body, head], inertia: Infinity, label: id });
    return { body: compound, hp: 100, color: color, cd: 0, isPunching: false };
}

const p1 = createStickman(window.innerWidth*0.2, 500, activeSkin, 'p1');
const p2 = createStickman(window.innerWidth*0.8, 500, '#ff0000', 'p2');
Composite.add(engine.world, [floor, ceiling, wallL, wallR, p1.body, p2.body]);

const keys = {};
const touch = { p1L: false, p1R: false, p1U: false };
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function setupInput(id, key) {
    const el = document.getElementById(id);
    const start = (e) => { e.preventDefault(); touch[key] = true; };
    const end = (e) => { e.preventDefault(); touch[key] = false; };
    el.addEventListener('touchstart', start); el.addEventListener('touchend', end);
    el.addEventListener('mousedown', start); el.addEventListener('mouseup', end);
}
setupInput('t1-left', 'p1L'); setupInput('t1-right', 'p1R'); setupInput('t1-up', 'p1U');

const p1Punch = (e) => { e.preventDefault(); if(gameStarted && p1.cd <= 0) { p1.cd = 20; p1.isPunching = true; checkHit(p1, p2); setTimeout(()=>p1.isPunching=false, 150); }};
document.getElementById('t1-punch').addEventListener('mousedown', p1Punch);
document.getElementById('t1-punch').addEventListener('touchstart', p1Punch);

function startGame(vsCPU, diff = 'EASY') {
    isCPU = vsCPU; difficulty = diff; gameStarted = true;
    document.getElementById('start-menu').style.display = 'none';
    document.getElementById('ui').style.display = 'flex';
    document.getElementById('controls').style.display = 'flex';
    Render.run(render); Runner.run(Runner.create(), engine);
}

Events.on(engine, 'beforeUpdate', () => {
    if (!gameStarted || p1.hp <= 0 || p2.hp <= 0) return;
    // P1 Movement
    if (keys['KeyA'] || touch.p1L) Body.setVelocity(p1.body, { x: -7, y: p1.body.velocity.y });
    if (keys['KeyD'] || touch.p1R) Body.setVelocity(p1.body, { x: 7, y: p1.body.velocity.y });
    if ((keys['KeyW'] || touch.p1U) && Math.abs(p1.body.velocity.y) < 0.1) Body.setVelocity(p1.body, { x: p1.body.velocity.x, y: -14 });
    if (keys['KeyS'] && p1.cd <= 0) p1Punch(new Event('keys'));

    if (isCPU) runGodAI();
    if(p1.cd > 0) p1.cd--; if(p2.cd > 0) p2.cd--;
});

function runGodAI() {
    const dist = p1.body.position.x - p2.body.position.x;
    const absDist = Math.abs(dist);
    const p1InCooldown = p1.cd > 5;

    // GOD LOGIC 1: Counter-Attacking
    if (p1InCooldown && absDist < 120) {
        // Dash in if player just missed
        Body.setVelocity(p2.body, { x: dist > 0 ? 8 : -8, y: p2.body.velocity.y });
    } 
    // GOD LOGIC 2: Perfect Spacing
    else if (p1.isPunching && absDist < 100) {
        // If player is punching, move BACKWARD instantly
        Body.setVelocity(p2.body, { x: dist > 0 ? -9 : 9, y: p2.body.velocity.y });
    }
    // GOD LOGIC 3: Aggressive Pressure
    else if (absDist > 80) {
        Body.setVelocity(p2.body, { x: dist > 0 ? 6.5 : -6.5, y: p2.body.velocity.y });
    }

    // GOD LOGIC 4: Anti-Air
    if (p1.body.position.y < p2.body.position.y - 40 && Math.abs(p2.body.velocity.y) < 0.1) {
        Body.setVelocity(p2.body, { x: p2.body.velocity.x, y: -14 });
    }

    // GOD LOGIC 5: Frames-perfect punching
    if (absDist < 95 && p2.cd <= 0) {
        p2.cd = 18; // Faster attack speed
        checkHit(p2, p1);
    }
}

function checkHit(attacker, defender) {
    const dist = Vector.magnitude(Vector.sub(attacker.body.position, defender.body.position));
    if (dist < 105) {
        defender.hp -= 10;
        document.getElementById(defender === p1 ? 'p1-hp' : 'p2-hp').style.width = Math.max(0, defender.hp) + '%';
        Body.applyForce(defender.body, defender.body.position, { x: (defender.body.position.x > attacker.body.position.x ? 0.08 : -0.08), y: -0.05 });
        if (defender.hp <= 0) {
            gameStarted = false;
            document.getElementById('winner-text').innerText = attacker === p1 ? "YOU DEFEATED GOD" : "GOD MODE: KO";
            document.getElementById('victory-screen').style.display = 'block';
        }
    }
}

Events.on(render, 'afterRender', () => {
    const ctx = render.context;
    let rainbowColor = `hsl(${(Date.now() % 2000) / 2000 * 360}, 100%, 50%)`;
    [p1, p2].forEach(p => {
        const pos = p.body.position;
        const dir = ((p === p1 ? p2 : p1).body.position.x > pos.x) ? 1 : -1;
        ctx.strokeStyle = (p === p2) ? '#ff0000' : (p.color === 'rainbow' ? rainbowColor : p.color); 
        ctx.lineWidth = 6; ctx.lineCap = 'round';
        if(p === p2) ctx.shadowBlur = 10, ctx.shadowColor = "red";
        ctx.save(); ctx.translate(pos.x, pos.y); ctx.beginPath();
        ctx.arc(0, -45, 15, 0, Math.PI * 2); ctx.moveTo(0, -30); ctx.lineTo(0, 15);
        ctx.moveTo(0, 15); ctx.lineTo(-15 * dir, 45); ctx.moveTo(0, 15); ctx.lineTo(15 * dir, 45);
        ctx.moveTo(0, -15); ctx.lineTo((p.cd > 8 ? 45 : 20) * dir, -15);
        ctx.stroke(); ctx.restore();
        ctx.shadowBlur = 0;
    });
});
</script>
</body>
</html>
